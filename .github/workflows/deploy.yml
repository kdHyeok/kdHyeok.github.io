name: Auto Update and Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 파이썬으로 데이터 업데이트
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install requests PyYAML

      - name: Update Data
        run: python update_projects.py

      # 2. 변경된 데이터를 다시 저장소에 커밋
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/github_data.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update github data" && git push)

      # 3. Ruby 환경 세팅 (Jekyll 빌드용)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundle-cache: true # 빌드 속도를 위해 캐시 사용

      # 4. Jekyll 빌드 (수동 빌드 방식)
      - name: Install Bundler & Build
        run: |
          bundle install
          bundle exec jekyll build

      # 5. 빌드 결과물 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      # 6. 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4