name: Auto Update and Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 시작 시점 SHA 저장 (schedule 실행 시 빌드 필요 여부 판단용)
      - name: Save initial SHA
        id: initial_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      # 1. 파이썬으로 데이터 업데이트
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install requests PyYAML Pillow

      - name: Update GitHub Data
        run: python update_projects.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. 변경된 데이터를 저장소에 커밋
      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/github_data.yml _data/contact.yml
          git diff --staged --quiet || (git commit -m "chore: update github data" && git push)

      # 3. Notion 알고리즘 DB → _posts/ 생성 (최종 편집 일시 기준으로 변경된 것만 업데이트)
      - name: Generate Algorithm Posts from Notion
        run: python create_algo_post.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ALGO_DB_ID: ${{ secrets.NOTION_ALGO_DB_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. 변경된 알고리즘 포스트만 커밋
      - name: Commit Algorithm Posts
        run: |
          git add _posts/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update algorithm posts" && git push)

      # 5. Notion DB → _posts/ 잡담 포스트 동기화
      - name: Generate Chatter Posts from Notion
        run: python create_chatter_post.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}

      - name: Commit Chatter Posts
        run: |
          git add _posts/daily/ assets/img/daily/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update daily posts" && git push)

      # 실제 변경이 있을 때만 빌드 (push는 항상, schedule은 커밋 발생 시에만)
      - name: Check if build needed
        id: should_build
        run: |
          CURRENT=$(git rev-parse HEAD)
          INITIAL="${{ steps.initial_sha.outputs.sha }}"
          if [ "${{ github.event_name }}" = "push" ] || [ "$CURRENT" != "$INITIAL" ]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      # 6. Ruby 환경 세팅 (Jekyll 빌드용)
      - name: Setup Ruby
        if: steps.should_build.outputs.result == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundle-cache: true

      # 7. Jekyll 빌드
      - name: Install Bundler & Build
        if: steps.should_build.outputs.result == 'true'
        run: |
          bundle install
          bundle exec jekyll build

      # 8. 빌드 결과물 업로드
      - name: Upload artifact
        if: steps.should_build.outputs.result == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      # 9. 배포
      - name: Deploy to GitHub Pages
        if: steps.should_build.outputs.result == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
